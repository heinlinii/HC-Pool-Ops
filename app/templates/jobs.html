{% extends "base.html" %}{% block content %}<section class="section-head"><h1>Jobs</h1></section><section class="panel"><h2>New Job</h2><form method="post" action="/jobs/new" class="form-grid"><input name="client" placeholder="Client"><input name="property" placeholder="Property"><input name="address" placeholder="Address"><input name="job_type" placeholder="Job type"><input name="date" type="date"><button class="primary">Create Job</button></form></section><section class="list-grid">{% for j in jobs %}<a class="list-card" href="/jobs/{{ j.id }}"><h2>{{ j.client or 'Job' }}</h2><p>{{ j.property }} {{ j.address }}</p><p><span class="pill">{{ j.status }}</span> {{ j.job_type }} · {{ j.date }}</p></a>{% endfor %}</section>{% endblock %}
