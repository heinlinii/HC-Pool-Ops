{% extends "base.html" %}{% block content %}<section class="panel"><h1>{{ job.client }} — {{ job.job_type }}</h1><form method="post" action="/jobs/{{ job.id }}/save" class="form-grid"><label>Client<input name="client" value="{{ job.client }}"></label><label>Property<input name="property" value="{{ job.property }}"></label><label class="wide">Address<input name="address" value="{{ job.address }}"></label><label>Job Type<input name="job_type" value="{{ job.job_type }}"></label><label>Status<input name="status" value="{{ job.status }}"></label><label>Crew<input name="crew" value="{{ job.crew }}"></label><label>Date<input name="date" type="date" value="{{ job.date[:10] if job.date }}"></label><label>Priority<input name="priority" value="{{ job.priority }}"></label><label class="wide">Notes<textarea name="notes">{{ job.notes }}</textarea></label><button class="primary wide">Save Job</button></form></section><h2>Photos</h2><section class="photo-grid">{% for ph in photos %}<article><img src="{{ ph.photo_url }}"><b>{{ ph.title }}</b><p>{{ ph.notes }}</p></article>{% endfor %}</section>{% endblock %}
