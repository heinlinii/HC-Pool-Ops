{% extends "base.html" %}

{% block title %}Add Client | HC Pool Ops{% endblock %}

{% block content %}
<div class="page-wrap narrow">
    <div class="page-head">
        <div>
            <h1>Add Client</h1>
            <p>Create a new client record.</p>
        </div>
        <div class="head-actions">
            <a class="btn" href="/clients">Back to Clients</a>
        </div>
    </div>

    <div class="panel">
        <form method="post" action="/clients/new" class="form-grid">
            <label>
                <span>Client Name</span>
                <input type="text" name="name" required />
            </label>

            <label>
                <span>Phone</span>
                <input type="text" name="phone" />
            </label>

            <label>
                <span>Email</span>
                <input type="email" name="email" />
            </label>

            <label>
                <span>Address</span>
                <input type="text" name="address" />
            </label>

            <label class="full">
                <span>Notes</span>
                <textarea name="notes" rows="5"></textarea>
            </label>

            <div class="full">
                <button type="submit" class="btn btn-primary">Save Client</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
