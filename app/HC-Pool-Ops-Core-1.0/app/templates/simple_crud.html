{% extends "base.html" %}{% block content %}<section class="panel"><h1>{{ title }}</h1><form method="post" action="/{{ title|lower|replace(' ','-') }}/add" class="form-grid">{% for f in fields %}{% if f == 'notes' %}<textarea class="wide" name="{{ f }}" placeholder="{{ f }}"></textarea>{% else %}<input name="{{ f }}" placeholder="{{ f }}">{% endif %}{% endfor %}<button class="primary wide">Add {{ title }}</button></form></section><section class="list-grid">{% for r in records %}<div class="list-card">{% for k,v in r.items() %}<p><b>{{ k }}:</b> {{ v }}</p>{% endfor %}</div>{% endfor %}</section>{% endblock %}
