{% extends "base.html" %}

{% block content %}
<div class="card">
    <h1>Dashboard</h1>
    <p>Clients: {{ client_count }}</p>
    <p>Properties: {{ property_count }}</p>
    <p>Jobs: {{ job_count }}</p>
</div>

<div class="card">
    <h2>Recent Jobs</h2>
    <ul>
        {% for job in recent_jobs %}
        <li>{{ job.title }}</li>
        {% else %}
        <li>No jobs yet.</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
