<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Assistant Interview</title>
    <link rel="stylesheet" href="/static/style.css?v=40">
</head>

<script>

const search = document.getElementById("clientSearch");
const select = document.getElementById("clientSelect");

search.addEventListener("input", function () {

    const query = this.value.toLowerCase();

    Array.from(select.options).forEach(option => {

        const match = option.text.toLowerCase().includes(query);

        option.style.display = match ? "block" : "none";

    });

});

</script>

<body>
{% include "_mobile_nav.html" %}

<div class="topbar-back">
    <button onclick="history.back()" class="back-btn">
        ← Back
    </button>
</div>

<div class="app-layout">

    {% include "_sidebar.html" %}

    <main class="main-content with-sidebar">

        <section class="hero-card">
            <h1>Live Assistant Interview</h1>

            <p>
                PoolOps interviews you and captures your field knowledge.
            </p>
        </section>

        <section class="content-card">

            <div class="assistant-chat">

                <div class="assistant-bubble">
                    Tell me about this pool.
                </div>

                <form method="post" action="/assistant-interview-live">

                    <div class="form-grid">

              <div class="form-group">
    <label>Select Existing Client</label>

    <input
        type="text"
        id="clientSearch"
        placeholder="Search clients..."
        autocomplete="off"
    >

    <select
        name="client"
        id="clientSelect"
        required
        size="8"
        style="margin-top:10px;"
    >

        {% for client in clients %}

        <option value="{{ client.name }}">
            {{ client.name }}
        </option>

        {% endfor %}

    </select>

</div>

<div class="form-group">
    <label>Or Add New Client</label>

    <input
        type="text"
        name="new_client"
        placeholder="New client name"
    >
</div>      

                        <div class="form-group form-full">
                            <label>Your Answer</label>

{% include "_ai_prompt_panel.html" %}

                            <textarea
                                name="notes"
                                rows="10"
                                placeholder="Use your microphone and speak naturally..."
                                required
                            ></textarea>
</html>
