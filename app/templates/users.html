{% extends "base.html" %}

{% block title %}Users | HC Pool Ops{% endblock %}

{% block content %}
<div class="page-wrap">
    <div class="page-head">
        <div>
            <h1>Users</h1>
            <p>Application users and roles.</p>
        </div>
        <div class="head-actions">
            <a class="btn" href="/dashboard">Back</a>
        </div>
    </div>

    <div class="panel">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Employee</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.username }}</td>
                    <td>{{ user.role }}</td>
                    <td>{{ user.employee_name }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
