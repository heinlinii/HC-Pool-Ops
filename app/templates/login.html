{% extends "layout.html" %}

{% block title %}Login • PoolOps Pro{% endblock %}

{% block content %}
<div class="center-wrap">
    <div class="card auth-card">
        <div class="eyebrow">PoolOps Pro</div>
        <h1>Login</h1>
        <p>Use your office or field login to continue.</p>

        <form method="post" action="{{ url_for('login') }}" class="form-stack">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</div>
{% endblock %}
