{% extends "base.html" %}
{% block content %}

<style>
  body.hfo-body {
    margin: 0 !important;
    min-height: 100vh !important;
    overflow: hidden !important;
    background: #03070a !important;
  }

  body.hfo-body .shell {
    width: 100vw !important;
    max-width: none !important;
    min-height: 100vh !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  .heinlin-login-page {
    position: relative !important;
    width: 100vw !important;
    height: 100vh !important;
    min-height: 100vh !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden !important;
    isolation: isolate !important;
  }

  .login-photo-bg {
    position: absolute !important;
    inset: 0 !important;
    z-index: 0 !important;
    background:
      linear-gradient(
        90deg,
        rgba(0, 0, 0, 0.12) 0%,
        rgba(0, 0, 0, 0.02) 48%,
        rgba(0, 0, 0, 0.10) 100%
      ),
      linear-gradient(
        rgba(255, 255, 255, 0.04),
        rgba(0, 0, 0, 0.20)
      ),
      url("/static/Dedicated%20to%20Steve%20Meyerholtz.jpg") !important;
    background-size: cover !important;
    background-position: center center !important;
    background-repeat: no-repeat !important;
  }

  .heinlin-identity-card,
  .crest-wrap {
    margin: 0 !important;
    padding: 0 !important;
    background: transparent !important;
    border: none !important;
    outline: none !important;
    box-shadow: none !important;
    border-radius: 0 !important;
    overflow: visible !important;
  }

  .heinlin-identity-card {
    position: absolute !important;
    top: clamp(42px, 7vh, 78px) !important;
    right: clamp(22px, 4vw, 66px) !important;
    width: min(350px, 27vw) !important;
    z-index: 2 !important;
    pointer-events: none !important;
  }

  .crest-wrap {
    width: 100% !important;
    display: flex !important;
    align-items: flex-start !important;
    justify-content: flex-end !important;
  }

  .heinlin-family-crest {
    display: block !important;
    width: 100% !important;
    height: auto !important;
    max-width: 100% !important;
    max-height: 52vh !important;
    object-fit: contain !important;
    filter: drop-shadow(0 18px 34px rgba(0, 0, 0, 0.72)) !important;
  }

  .heinlin-login-panel {
    position: absolute !important;
    left: clamp(18px, 3vw, 48px) !important;
    bottom: clamp(16px, 3vh, 38px) !important;
    width: min(390px, 34vw) !important;
    margin: 0 !important;
    padding: 13px 16px 15px !important;
    border-radius: 18px !important;
    background: rgba(5, 12, 18, 0.76) !important;
    border: 1px solid rgba(255, 255, 255, 0.10) !important;
    box-shadow: 0 18px 52px rgba(0, 0, 0, 0.42) !important;
    backdrop-filter: blur(10px) !important;
    z-index: 3 !important;
  }

  .heinlin-login-panel h2 {
    margin: 0 0 10px !important;
    color: #ffffff !important;
    font-size: clamp(1.12rem, 1.55vw, 1.42rem) !important;
    line-height: 1 !important;
    font-weight: 950 !important;
    letter-spacing: -0.04em !important;
    white-space: nowrap !important;
  }

  .heinlin-login-panel label {
    display: block !important;
    margin: 7px 0 4px !important;
    color: rgba(255, 255, 255, 0.9) !important;
    font-size: 0.72rem !important;
    font-weight: 900 !important;
  }

  .heinlin-login-panel input {
    width: 100% !important;
    min-height: 34px !important;
    border-radius: 11px !important;
    padding: 0 10px !important;
    border: 1px solid rgba(255, 255, 255, 0.15) !important;
    background: rgba(0, 0, 0, 0.28) !important;
    color: #ffffff !important;
    font-size: 0.88rem !important;
    outline: none !important;
  }

  .heinlin-login-panel input:focus {
    border-color: rgba(215, 168, 75, 0.82) !important;
    box-shadow: 0 0 0 3px rgba(215, 168, 75, 0.14) !important;
  }

  .heinlin-login-panel .login-submit {
    width: 100% !important;
    min-height: 38px !important;
    margin-top: 12px !important;
    border-radius: 12px !important;
    font-size: 0.68rem !important;
    letter-spacing: 0.07em !important;
  }

  .login-error {
    color: #ffb4b4 !important;
    background: rgba(120, 25, 25, 0.3) !important;
    border: 1px solid rgba(255, 120, 120, 0.25) !important;
    border-radius: 12px !important;
    padding: 8px 10px !important;
    font-weight: 800 !important;
  }

  @media (max-width: 980px) {
    .heinlin-identity-card {
      width: min(300px, 31vw) !important;
      top: 42px !important;
      right: 26px !important;
    }

    .heinlin-login-panel {
      width: min(370px, 39vw) !important;
    }
  }

  @media (max-width: 720px) {
    body.hfo-body {
      min-height: 100svh !important;
      overflow: hidden !important;
    }

    body.hfo-body .shell {
      min-height: 100svh !important;
    }

    .heinlin-login-page {
      height: 100svh !important;
      min-height: 100svh !important;
      overflow: hidden !important;
    }

    .login-photo-bg {
      background:
        linear-gradient(rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.42)),
        url("/static/Dedicated%20to%20Steve%20Meyerholtz.jpg") !important;
      background-size: cover !important;
      background-position: 64% center !important;
      background-repeat: no-repeat !important;
    }

    .heinlin-identity-card {
      top: 54px !important;
      right: 14px !important;
      width: min(170px, 42vw) !important;
    }

    .heinlin-family-crest {
      max-height: 180px !important;
    }

    .heinlin-login-panel {
      left: 12px !important;
      right: 12px !important;
      bottom: 12px !important;
      width: auto !important;
      padding: 16px 18px 18px !important;
      border-radius: 22px !important;
      background: rgba(5, 12, 18, 0.82) !important;
    }

    .heinlin-login-panel h2 {
      margin-bottom: 13px !important;
      font-size: clamp(1.32rem, 5vw, 1.68rem) !important;
      white-space: nowrap !important;
    }

    .heinlin-login-panel label {
      margin: 9px 0 5px !important;
      font-size: 0.9rem !important;
    }

    .heinlin-login-panel input {
      min-height: 42px !important;
      border-radius: 14px !important;
    }

    .heinlin-login-panel .login-submit {
      min-height: 46px !important;
      margin-top: 14px !important;
      font-size: 0.76rem !important;
    }
  }

  @media (max-width: 430px) and (max-height: 760px) {
    .heinlin-identity-card {
      top: 46px !important;
      right: 12px !important;
      width: min(150px, 38vw) !important;
    }

    .heinlin-family-crest {
      max-height: 160px !important;
    }

    .heinlin-login-panel {
      padding: 14px 17px 16px !important;
    }

    .heinlin-login-panel h2 {
      font-size: 1.28rem !important;
      margin-bottom: 10px !important;
    }

    .heinlin-login-panel input {
      min-height: 39px !important;
    }

    .heinlin-login-panel .login-submit {
      min-height: 42px !important;
      margin-top: 12px !important;
    }
  }
</style>

<div class="heinlin-login-page">

  <div class="login-photo-bg" aria-hidden="true"></div>

  <section class="heinlin-identity-card">
    <div class="crest-wrap">
      <img
        src="/static/heinlin-family-crest.png"
        alt="Heinlin Concrete Family Crest"
        class="heinlin-family-crest"
      >
    </div>
  </section>

  <form method="post" action="/login" class="panel heinlin-login-panel">
    <h2>Enter Command Center</h2>

    {% if error %}
      <p class="login-error">{{ error }}</p>
    {% endif %}

    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>

    <button type="submit" class="btn primary login-submit">
      Enter Command Center
    </button>
  </form>

</div>

{% endblock %}
