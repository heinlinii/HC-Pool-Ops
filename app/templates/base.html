<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PoolOps Pro{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <img src="/static/logo.png?v=5" style="height:40px; width:auto; margin-right:10px;" alt="Heinlin Logo">
            <div>
                <div class="brand-title">Heinlin PoolOps Pro</div>
                <div class="brand-subtitle">Office + Field workflow</div>
            </div>
        </div>

        <nav class="nav">
            <a href="/">Office</a>
            <a href="/field">Field</a>
            <a href="/today">Today</a>
            <a href="/clients">Clients</a>
            <a href="/properties">Properties</a>
            <a href="/employees">Employees</a>
            <a href="/schedule">Schedule</a>
            <a href="/requests">Requests</a>
            <a href="/portal/request">Client Portal</a>
            <a href="/logout">Logout</a>
        </nav>
    </header>

    <main class="page-shell">
        {% if current_user %}
        <div style="margin-bottom:16px; color:#94a3b8;">
            Logged in as <strong style="color:#fff;">{{ current_user.username }}</strong>
            — role: <strong style="color:#fff;">{{ current_user.role }}</strong>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
