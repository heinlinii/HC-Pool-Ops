{% extends "base.html" %}{% block content %}<section class="panel calendar"><div class="section-head"><h1>Monthly Schedule</h1><a class="btn" href="/jobs">+ Job</a></div><div class="month-grid"><b>Sun</b><b>Mon</b><b>Tue</b><b>Wed</b><b>Thu</b><b>Fri</b><b>Sat</b>{% for d in days %}<div class="day {% if not d.in_month %}dim{% endif %} {% if d.is_today %}today{% endif %}" {% if d.image %}style="background-image:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),url('{{ d.image }}')"{% endif %}><span>{{ d.day }}</span>{% for j in d.jobs %}<a class="event" href="/jobs/{{ j.id }}">{{ j.client or j.property or 'Job' }}</a>{% endfor %}<form class="tiny-upload" action="/calendar/day-image" method="post" enctype="multipart/form-data"><input type="hidden" name="day_date" value="{{ d.date }}"><input name="image" type="file" accept="image/*"><button>Photo</button></form></div>{% endfor %}</div></section>{% endblock %}
