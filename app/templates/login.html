{% extends "base.html" %}
{% block content %}

<div class="heinlin-login-page">

  <form method="post" action="/login" class="panel heinlin-login-panel">

    <div class="login-crest-wrap">
      <img
        src="/static/heinlin-family-crest.png"
        alt="Heinlin Concrete Family Crest"
        class="login-panel-crest"
      >
    </div>

    <p class="login-kicker">Founded 1907 • 5 Generations Strong</p>

    <h2>Heinlin Operations Center</h2>
    <p class="login-subtitle">Historic Roots • Modern Technology</p>

    {% if error %}
      <p class="login-error">{{ error }}</p>
    {% endif %}

    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>

    <button type="submit" class="btn primary login-submit">
      Enter Operations Center
    </button>
  </form>

</div>

{% endblock %}
