<!doctype html><html><head><title>Employee Portal</title><link rel="stylesheet" href="/static/core1/core1.css"></head><body><main class="shell"><a href="/core">← Core</a><h1>Employee Portal</h1><section class="card"><h2>Clock In / Out</h2><form method="post" action="/portal/employee/clock" id="clockForm"><input type="hidden" name="lat" id="lat"><input type="hidden" name="lng" id="lng"><button name="action" value="in">Clock In with GPS</button><button name="action" value="out">Clock Out with GPS</button></form></section><section class="card"><h2>My Jobs</h2><ul>{% for job in jobs %}<li>{{ job.date }} — {{ job.address }} — {{ job.job_type }} — {{ job.status }}</li>{% endfor %}</ul></section></main><script>navigator.geolocation&&navigator.geolocation.getCurrentPosition(p=>{lat.value=p.coords.latitude;lng.value=p.coords.longitude;});</script></body></html>
