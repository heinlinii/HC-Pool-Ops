<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Estimate • PoolOps2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css?v=46">
</head>

<body>
{% include "_mobile_nav.html" %}

<h1>New Estimate</h1>

<p>Type: {{ estimate_type_label }}</p>

<form method="post" action="/estimate/new/save">

    <input type="hidden" name="estimate_type" value="{{ estimate_type }}">

    <label>Client Name</label><br>
   <label>Client</label><br>

<select name="client_name" id="client-select">
    <option value="">Select Client</option>

    {% for client in clients %}
        <option value="{{ client.name }}">
            {{ client.name }}
        </option>
    {% endfor %}

</select>

<br><br>

    <label>Property Address</label><br>
   <label>Property Address</label><br>

<select name="property_address" id="property-select">

    <option value="">
        Select Property
    </option>

    {% for property in properties %}
        <option
            value="{{ property.address }}"
            data-client="{{ property.client.name if property.client else '' }}"
        >
            {{ property.address }}
        </option>
    {% endfor %}

</select>

<br><br>

    <label>Estimate Title</label><br>
    <input name="title" value="{{ estimate_type_label }}"><br><br>

    <label>Scope Notes</label><br>
    <textarea name="scope_notes" rows="6"></textarea><br><br>

    <label>Material Cost</label><br>
    <input name="material_cost" type="number" step="0.01"><br><br>

    <label>Labor Cost</label><br>
    <input name="labor_cost" type="number" step="0.01"><br><br>

    <label>Markup %</label><br>
    <input name="markup_percent" type="number" value="35"><br><br>

    <button type="submit">
        Save Estimate
    </button>

</form>

<br>

<a href="/estimates">Back to Estimates</a>

<script>

const clientSelect = document.getElementById("client-select");
const propertySelect = document.getElementById("property-select");

clientSelect.addEventListener("change", function () {

    const selectedClient = this.value;

    Array.from(propertySelect.options).forEach(option => {

        if (option.value === "") {
            option.hidden = false;
            return;
        }

        if (selectedClient === "") {
            option.hidden = false;
            return;
        }

        option.hidden =
            option.dataset.client !== selectedClient;
    });

    propertySelect.value = "";

});

</script>

</body>
</html>
