{% extends "base.html" %}{% block content %}<section class="panel"><h1>Field Log</h1><form method="post" action="/field-logs/add" class="form-grid"><input name="employee_name" placeholder="Employee"><input name="client" placeholder="Client"><input name="property" placeholder="Property"><input name="address" placeholder="Address"><input name="date_str" type="date"><input name="total_hours" type="number" step="0.25" placeholder="Hours"><textarea name="tools_used" placeholder="Tools used"></textarea><textarea name="materials_used" placeholder="Materials used"></textarea><textarea name="equipment_used" placeholder="Equipment used"></textarea><textarea class="wide" name="work_completed" placeholder="Work completed"></textarea><textarea class="wide" name="issues" placeholder="Issues"></textarea><textarea class="wide" name="next_steps" placeholder="Next steps"></textarea><input name="weather" placeholder="Weather"><button class="primary wide">Save Field Log</button></form></section><section class="list-grid">{% for l in logs %}<div class="list-card"><h2>{{ l.client }}</h2><p>{{ l.date }} · {{ l.employee_name }} · {{ l.total_hours }} hrs</p><p>{{ l.work_completed }}</p></div>{% endfor %}</section>{% endblock %}
