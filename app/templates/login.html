{% extends "base.html" %}
{% block content %}

<style>
  body.hfo-body {
    margin: 0 !important;
    min-height: 100vh !important;
    overflow: hidden !important;
    background: #03070a !important;
  }

  body.hfo-body .shell {
    width: 100vw !important;
    max-width: none !important;
    min-height: 100vh !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  .heinlin-login-page {
    /*
      EASY CONTROLS

      Desktop background:
      --bg-x moves image left/right.
      --bg-y moves image up/down.
      --bg-size controls crop/zoom.

      Crest:
      --crest-size makes logo bigger/smaller.
      --crest-top moves logo up/down.
      --crest-right moves logo left/right.

      Login box:
      --panel-width makes box bigger/smaller.
      --panel-left moves box left/right.
      --panel-bottom moves box up/down.
    */

    --bg-x: 50%;
    --bg-y: 50%;
    --bg-size: cover;

    --crest-size: min(285px, 22vw);
    --crest-top: clamp(28px, 5vh, 54px);
    --crest-right: clamp(24px, 5vw, 82px);

    --panel-width: min(420px, 34vw);
    --panel-left: clamp(24px, 4vw, 64px);
    --panel-bottom: clamp(22px, 5vh, 56px);

    position: relative !important;
    width: 100vw !important;
    height: 100vh !important;
    min-height: 100vh !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden !important;
    isolation: isolate !important;
    background: #03070a !important;
  }

  .login-photo-bg {
    position: absolute !important;
    inset: 0 !important;
    z-index: 0 !important;
    background:
      linear-gradient(
        90deg,
        rgba(0, 0, 0, 0.42) 0%,
        rgba(0, 0, 0, 0.20) 42%,
        rgba(0, 0, 0, 0.18) 100%
      ),
      linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.03) 0%,
        rgba(0, 0, 0, 0.18) 48%,
        rgba(0, 0, 0, 0.46) 100%
      ),
      url("/static/heinlin-login-bg-truck.jpg") !important;

    background-size: var(--bg-size) !important;
    background-position: var(--bg-x) var(--bg-y) !important;
    background-repeat: no-repeat !important;
  }

  .heinlin-identity-card,
  .crest-wrap {
    margin: 0 !important;
    padding: 0 !important;
    background: transparent !important;
    border: none !important;
    outline: none !important;
    box-shadow: none !important;
    border-radius: 0 !important;
    overflow: visible !important;
  }

  .heinlin-identity-card {
    position: absolute !important;
    top: var(--crest-top) !important;
    right: var(--crest-right) !important;
    width: var(--crest-size) !important;
    z-index: 2 !important;
    pointer-events: none !important;
  }

  .crest-wrap {
    width: 100% !important;
    display: flex !important;
    align-items: flex-start !important;
    justify-content: flex-end !important;
  }

  .heinlin-family-crest {
    display: block !important;
    width: 100% !important;
    height: auto !important;
    max-width: 100% !important;
    max-height: 42vh !important;
    object-fit: contain !important;
    filter: drop-shadow(0 22px 36px rgba(0, 0, 0, 0.76)) !important;
  }

  .heinlin-login-panel {
    position: absolute !important;
    left: var(--panel-left) !important;
    bottom: var(--panel-bottom) !important;
    width: var(--panel-width) !important;
    margin: 0 !important;
    padding: 26px 28px 28px !important;
    border-radius: 24px !important;
    background: rgba(5, 12, 18, 0.82) !important;
    border: 1px solid rgba(215, 168, 75, 0.24) !important;
    box-shadow: 0 28px 85px rgba(0, 0, 0, 0.56) !important;
    backdrop-filter: blur(14px) !important;
    z-index: 3 !important;
  }

  .heinlin-login-panel h2 {
    margin: 0 0 8px !important;
    color: #ffffff !important;
    font-size: clamp(1.85rem, 3vw, 2.75rem) !important;
    line-height: 0.96 !important;
    font-weight: 950 !important;
    letter-spacing: -0.06em !important;
  }

  .login-subtitle {
    margin: 0 0 24px !important;
    color: rgba(255, 255, 255, 0.66) !important;
    font-size: 0.95rem !important;
    font-weight: 700 !important;
  }

  .heinlin-login-panel label {
    display: block !important;
    margin: 13px 0 6px !important;
    color: rgba(255, 255, 255, 0.92) !important;
    font-size: 0.84rem !important;
    font-weight: 900 !important;
  }

  .heinlin-login-panel input {
    width: 100% !important;
    min-height: 48px !important;
    border-radius: 14px !important;
    padding: 0 14px !important;
    border: 1px solid rgba(255, 255, 255, 0.16) !important;
    background: rgba(0, 0, 0, 0.34) !important;
    color: #ffffff !important;
    font-size: 0.98rem !important;
    font-weight: 700 !important;
    outline: none !important;
  }

  .heinlin-login-panel input:focus {
    border-color: rgba(215, 168, 75, 0.86) !important;
    box-shadow: 0 0 0 4px rgba(215, 168, 75, 0.16) !important;
  }

  .heinlin-login-panel .login-submit {
    width: 100% !important;
    min-height: 52px !important;
    margin-top: 18px !important;
    border: 0 !important;
    border-radius: 16px !important;
    color: #11110d !important;
    background: linear-gradient(135deg, #b98239, #e0b76c) !important;
    box-shadow: 0 18px 34px rgba(0, 0, 0, 0.38) !important;
    font-size: 0.82rem !important;
    font-weight: 950 !important;
    letter-spacing: 0.11em !important;
    text-transform: uppercase !important;
    cursor: pointer !important;
  }

  .heinlin-login-panel .login-submit:active {
    transform: translateY(1px) !important;
  }

  .login-error {
    color: #ffb4b4 !important;
    background: rgba(120, 25, 25, 0.3) !important;
    border: 1px solid rgba(255, 120, 120, 0.25) !important;
    border-radius: 12px !important;
    padding: 8px 10px !important;
    font-weight: 800 !important;
  }

  @media (max-width: 980px) {
    .heinlin-login-page {
      --crest-size: min(240px, 28vw);
      --crest-top: 32px;
      --crest-right: 28px;
      --panel-width: min(390px, 42vw);
    }
  }

  /*
    MOBILE:
    This switches from "everything crammed into one screen"
    to "image on top, login box below." This lets you keep more
    of the truck/fountain/crest visible.
  */
  @media (max-width: 720px) {
    body.hfo-body {
      min-height: 100svh !important;
      overflow-y: auto !important;
      overflow-x: hidden !important;
    }

    body.hfo-body .shell {
      min-height: 100svh !important;
    }

    .heinlin-login-page {
      --bg-x: 63%;
      --bg-y: center;
      --bg-size: cover;

      --crest-size: min(138px, 36vw);
      --crest-top: 24px;
      --crest-right: 18px;

      width: 100vw !important;
      height: auto !important;
      min-height: 100svh !important;
      overflow-y: auto !important;
      overflow-x: hidden !important;
      display: block !important;
    }

    .login-photo-bg {
      position: relative !important;
      inset: auto !important;
      width: 100% !important;
      height: 58svh !important;
      min-height: 360px !important;
      max-height: 520px !important;
      z-index: 0 !important;
      background:
        linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.04) 0%,
          rgba(0, 0, 0, 0.18) 46%,
          rgba(3, 7, 10, 0.96) 100%
        ),
        url("/static/heinlin-login-bg-truck.jpg") !important;
      background-size: var(--bg-size) !important;
      background-position: var(--bg-x) var(--bg-y) !important;
      background-repeat: no-repeat !important;
    }

    .heinlin-identity-card {
      top: var(--crest-top) !important;
      right: var(--crest-right) !important;
      width: var(--crest-size) !important;
    }

    .heinlin-family-crest {
      max-height: 155px !important;
    }

    .heinlin-login-panel {
      position: relative !important;
      left: auto !important;
      right: auto !important;
      bottom: auto !important;
      width: auto !important;
      margin: -54px 14px 24px !important;
      padding: 24px 22px 24px !important;
      border-radius: 24px !important;
      background: rgba(5, 12, 18, 0.90) !important;
      z-index: 4 !important;
    }

    .heinlin-login-panel h2 {
      margin-bottom: 8px !important;
      font-size: clamp(1.85rem, 8vw, 2.35rem) !important;
      white-space: normal !important;
    }

    .login-subtitle {
      margin-bottom: 22px !important;
      font-size: 0.92rem !important;
    }

    .heinlin-login-panel label {
      margin: 12px 0 6px !important;
      font-size: 0.9rem !important;
    }

    .heinlin-login-panel input {
      min-height: 48px !important;
      border-radius: 14px !important;
    }

    .heinlin-login-panel .login-submit {
      min-height: 52px !important;
      margin-top: 16px !important;
      font-size: 0.78rem !important;
    }
  }

  @media (max-width: 430px) and (max-height: 760px) {
    .heinlin-login-page {
      --crest-size: min(120px, 34vw);
      --crest-top: 18px;
      --crest-right: 14px;
    }

    .login-photo-bg {
      height: 54svh !important;
      min-height: 320px !important;
    }

    .heinlin-login-panel {
      margin-top: -46px !important;
      padding: 20px 18px 22px !important;
    }

    .heinlin-login-panel h2 {
      font-size: 1.78rem !important;
    }

    .heinlin-login-panel input {
      min-height: 44px !important;
    }

    .heinlin-login-panel .login-submit {
      min-height: 48px !important;
    }
  }
</style>

<div class="heinlin-login-page">

  <div class="login-photo-bg" aria-hidden="true"></div>

  <section class="heinlin-identity-card">
    <div class="crest-wrap">
      <img
        src="/static/heinlin-family-crest.png"
        alt="Heinlin Concrete Family Crest"
        class="heinlin-family-crest"
      >
    </div>
  </section>

  <form method="post" action="/login" class="panel heinlin-login-panel">
    <h2>Heinlin Command Center</h2>
    <p class="login-subtitle">Secure access portal</p>

    {% if error %}
      <p class="login-error">{{ error }}</p>
    {% endif %}

    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>

    <button type="submit" class="btn primary login-submit">
      Enter
    </button>
  </form>

</div>

{% endblock %}
