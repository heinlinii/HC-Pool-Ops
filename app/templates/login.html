{% extends "base.html" %}
{% block content %}

<style>
  body.hfo-body {
    min-height: 100vh !important;
    background:
      linear-gradient(rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0.48)),
      url("/static/Dedicated%20to%20Steve%20Meyerholtz.jpg") !important;
    background-size: cover !important;
    background-position: center center !important;
    background-repeat: no-repeat !important;
    background-attachment: fixed !important;
  }

  body.hfo-body .shell {
    width: 100% !important;
    max-width: none !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  .heinlin-login-page {
    position: relative !important;
    width: 100vw !important;
    min-height: 100vh !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden !important;
  }

  .heinlin-identity-card,
  .crest-wrap {
    margin: 0 !important;
    padding: 0 !important;
    background: transparent !important;
    border: none !important;
    outline: none !important;
    box-shadow: none !important;
    border-radius: 0 !important;
    overflow: visible !important;
  }

  .heinlin-identity-card {
    position: absolute !important;
    top: clamp(58px, 9vh, 96px) !important;
    right: clamp(18px, 5vw, 82px) !important;
    width: min(470px, 42vw) !important;
    z-index: 2 !important;
  }

  .crest-wrap {
    width: 100% !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
  }

  .heinlin-family-crest {
    display: block !important;
    width: 100% !important;
    height: auto !important;
    max-width: 100% !important;
    max-height: 58vh !important;
    object-fit: contain !important;
    filter: drop-shadow(0 18px 34px rgba(0, 0, 0, 0.72)) !important;
  }

  .heinlin-login-panel {
    position: absolute !important;
    left: clamp(20px, 5vw, 76px) !important;
    bottom: clamp(18px, 5vh, 58px) !important;
    width: min(500px, calc(100vw - 44px)) !important;
    margin: 0 !important;
    padding: 18px 22px 20px !important;
    border-radius: 22px !important;
    background: rgba(5, 12, 18, 0.84) !important;
    border: 1px solid rgba(255, 255, 255, 0.11) !important;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.48) !important;
    backdrop-filter: blur(14px) !important;
    z-index: 3 !important;
  }

  .heinlin-login-panel h2 {
    margin: 0 0 14px !important;
    color: #ffffff !important;
    font-size: clamp(1.55rem, 2.45vw, 2.05rem) !important;
    line-height: 1 !important;
    font-weight: 950 !important;
    letter-spacing: -0.045em !important;
    white-space: nowrap !important;
  }

  .heinlin-login-panel label {
    display: block !important;
    margin: 9px 0 5px !important;
    color: rgba(255, 255, 255, 0.9) !important;
    font-size: 0.82rem !important;
    font-weight: 900 !important;
  }

  .heinlin-login-panel input {
    width: 100% !important;
    min-height: 38px !important;
    border-radius: 13px !important;
    padding: 0 12px !important;
    border: 1px solid rgba(255, 255, 255, 0.15) !important;
    background: rgba(0, 0, 0, 0.32) !important;
    color: #ffffff !important;
    font-size: 0.95rem !important;
    outline: none !important;
  }

  .heinlin-login-panel input:focus {
    border-color: rgba(215, 168, 75, 0.82) !important;
    box-shadow: 0 0 0 4px rgba(215, 168, 75, 0.14) !important;
  }

  .heinlin-login-panel .login-submit {
    width: 100% !important;
    min-height: 42px !important;
    margin-top: 14px !important;
    border-radius: 14px !important;
    font-size: 0.78rem !important;
    letter-spacing: 0.07em !important;
  }

  .login-error {
    color: #ffb4b4 !important;
    background: rgba(120, 25, 25, 0.3) !important;
    border: 1px solid rgba(255, 120, 120, 0.25) !important;
    border-radius: 14px !important;
    padding: 10px 12px !important;
    font-weight: 800 !important;
  }

  @media (max-width: 720px) {
    body.hfo-body {
      min-height: 100svh !important;
      background:
        linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.58)),
        url("/static/Dedicated%20to%20Steve%20Meyerholtz.jpg") !important;
      background-size: cover !important;
      background-position: center top !important;
      background-repeat: no-repeat !important;
      background-attachment: scroll !important;
    }

    .heinlin-login-page {
      min-height: 100svh !important;
      overflow: hidden !important;
    }

    .heinlin-identity-card {
      top: 74px !important;
      right: 16px !important;
      width: min(260px, 58vw) !important;
    }

    .heinlin-family-crest {
      max-height: 260px !important;
    }

    .heinlin-login-panel {
      left: 12px !important;
      right: 12px !important;
      bottom: 14px !important;
      width: auto !important;
      padding: 18px 18px 20px !important;
      border-radius: 24px !important;
    }

    .heinlin-login-panel h2 {
      margin-bottom: 14px !important;
      font-size: clamp(1.45rem, 6vw, 1.85rem) !important;
      white-space: nowrap !important;
    }

    .heinlin-login-panel label {
      margin: 10px 0 6px !important;
      font-size: 0.95rem !important;
    }

    .heinlin-login-panel input {
      min-height: 44px !important;
      border-radius: 15px !important;
    }

    .heinlin-login-panel .login-submit {
      min-height: 48px !important;
      margin-top: 16px !important;
      font-size: 0.82rem !important;
    }
  }

  @media (max-width: 430px) and (max-height: 760px) {
    .heinlin-identity-card {
      top: 60px !important;
      right: 14px !important;
      width: min(230px, 54vw) !important;
    }

    .heinlin-family-crest {
      max-height: 225px !important;
    }

    .heinlin-login-panel {
      padding: 16px 18px 18px !important;
    }

    .heinlin-login-panel h2 {
      font-size: 1.45rem !important;
    }

    .heinlin-login-panel input {
      min-height: 40px !important;
    }

    .heinlin-login-panel .login-submit {
      min-height: 44px !important;
      margin-top: 14px !important;
    }
  }
</style>

<div class="heinlin-login-page">

  <section class="heinlin-identity-card">
    <div class="crest-wrap">
      <img
        src="/static/heinlin-family-crest.png"
        alt="Heinlin Concrete Family Crest"
        class="heinlin-family-crest"
      >
    </div>
  </section>

  <form method="post" action="/login" class="panel heinlin-login-panel">
    <h2>Enter Command Center</h2>

    {% if error %}
      <p class="login-error">{{ error }}</p>
    {% endif %}

    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>

    <button type="submit" class="btn primary login-submit">
      Enter Command Center
    </button>
  </form>

</div>

{% endblock %}
