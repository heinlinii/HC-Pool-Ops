{% extends "base.html" %}
{% block content %}

<div class="hfo-mobile-command">

  <section class="hfo-mobile-section">
    <h2>Weather</h2>
    <p class="muted">
      Evansville jobsite forecast, alerts, and radar access.
    </p>

    <div class="hfo-weather-actions">
      <a class="btn primary" href="https://radar.weather.gov/" target="_blank">
        Open NWS Radar
      </a>
      <button class="btn" type="button" onclick="loadWeather()">Refresh Weather</button>
    </div>

    <div id="weatherStatus" class="muted">Loading weather...</div>

    <div id="weatherAlerts" class="hfo-weather-alerts"></div>

    <div id="weatherForecast" class="hfo-weather-grid"></div>
  </section>

</div>

<script>
  const EVANSVILLE_LAT = 37.9716;
  const EVANSVILLE_LNG = -87.5711;

  async function fetchJson(url) {
    const response = await fetch(url, {
      headers: {
        "Accept": "application/geo+json, application/json"
      }
    });

    if (!response.ok) {
      throw new Error("Weather request failed: " + response.status);
    }

    return await response.json();
  }

  async function loadWeather() {
    const status = document.getElementById("weatherStatus");
    const forecastBox = document.getElementById("weatherForecast");
    const alertsBox = document.getElementById("weatherAlerts");

    status.textContent = "Loading weather...";
    forecastBox.innerHTML = "";
    alertsBox.innerHTML = "";

    try {
      const pointData = await fetchJson(
        `https://api.weather.gov/points/${EVANSVILLE_LAT},${EVANSVILLE_LNG}`
      );

      const forecastUrl = pointData.properties.forecast;

      const forecastData = await fetchJson(forecastUrl);

      const alertsData = await fetchJson(
        `https://api.weather.gov/alerts/active?point=${EVANSVILLE_LAT},${EVANSVILLE_LNG}`
      );

      status.textContent = "Weather loaded for Evansville area.";

      if (alertsData.features && alertsData.features.length > 0) {
        alertsBox.innerHTML = `
  <h3>Weather Watch</h3>
  <p class="muted">
    Severe weather alerts, jobsite risk, radar checks, and field action warnings.
  </p>

  <h3>Active Severe Weather Alerts</h3>

  ${alertsData.features.map(function(alert) {
    const p = alert.properties;
    return `
      <div class="hfo-weather-alert">
        <strong>${p.event || "Weather Alert"}</strong>
        <p>${p.headline || ""}</p>
        <p>${p.description || ""}</p>
      </div>
    `;
  }).join("")}

  <div class="hfo-weather-alert">
    <strong>Jobsite Weather Actions</strong>
    <p><strong>Tornado / Severe Thunderstorm:</strong> Stop field work and get crews under cover.</p>
    <p><strong>Lightning:</strong> No pool work, metal tools, equipment pads, or open excavation work.</p>
    <p><strong>Heavy Rain / Flooding:</strong> Check excavations, drainage, pool water levels, and equipment pads.</p>
    <p><strong>High Wind:</strong> Secure covers, forms, tools, materials, and loose jobsite items.</p>
    <p><strong>Power Outage Risk:</strong> Check pool pumps, automation, heaters, and weather protection systems.</p>
  </div>
`;
     } else {
  alertsBox.innerHTML = `
    <h3>Weather Watch</h3>
    <p class="muted">
      No active severe weather alerts are currently listed for the Evansville area.
    </p>

    <div class="hfo-weather-alert">
      <strong>Jobsite Weather Actions</strong>
      <p><strong>Tornado / Severe Thunderstorm:</strong> Stop field work and get crews under cover.</p>
      <p><strong>Lightning:</strong> No pool work, metal tools, equipment pads, or open excavation work.</p>
      <p><strong>Heavy Rain / Flooding:</strong> Check excavations, drainage, pool water levels, and equipment pads.</p>
      <p><strong>High Wind:</strong> Secure covers, forms, tools, materials, and loose jobsite items.</p>
      <p><strong>Power Outage Risk:</strong> Check pool pumps, automation, heaters, and weather protection systems.</p>
    </div>
  `;
}

      const periods = forecastData.properties.periods || [];

      forecastBox.innerHTML = periods.slice(0, 8).map(function(period) {
        return `
          <div class="hfo-weather-card">
            <h3>${period.name}</h3>
            <strong>${period.temperature}°${period.temperatureUnit}</strong>
            <p>${period.shortForecast}</p>
            <small>${period.windSpeed} ${period.windDirection}</small>
          </div>
        `;
      }).join("");

    } catch (error) {
      console.error(error);
      status.textContent = "Could not load weather. Try again.";
    }
  }

  loadWeather();
</script>

{% endblock %}
