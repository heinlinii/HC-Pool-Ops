{% extends "base.html" %}
{% block content %}

<style>
  body.hfo-body {
    min-height: 100vh !important;
    background:
      linear-gradient(rgba(0, 0, 0, 0.58), rgba(0, 0, 0, 0.84)),
      url("/static/Dedicated%20to%20Steve%20Meyerholtz.jpg") !important;
    background-size: cover !important;
    background-position: center !important;
    background-repeat: no-repeat !important;
    background-attachment: fixed !important;
  }

  body.hfo-body .shell {
    width: 100% !important;
    max-width: none !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  .heinlin-login-page {
    width: min(560px, calc(100vw - 28px)) !important;
    min-height: 100vh !important;
    margin: 0 auto !important;
    padding: 18px 0 24px !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: center !important;
    gap: 14px !important;
  }

  .heinlin-identity-card,
  .crest-wrap {
    width: 100% !important;
    height: auto !important;
    margin: 0 auto !important;
    padding: 0 !important;
    background: transparent !important;
    border: none !important;
    outline: none !important;
    box-shadow: none !important;
    border-radius: 0 !important;
    overflow: visible !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
  }

  .heinlin-family-crest {
    display: block !important;
    width: auto !important;
    height: auto !important;
    max-width: min(360px, 72vw) !important;
    max-height: 300px !important;
    margin: 0 auto !important;
    object-fit: contain !important;
    filter: drop-shadow(0 18px 34px rgba(0, 0, 0, 0.72)) !important;
  }

  .heinlin-login-panel {
    width: 100% !important;
    margin: 0 auto !important;
    padding: 26px 28px 30px !important;
    border-radius: 28px !important;
    background: rgba(5, 12, 18, 0.88) !important;
    border: 1px solid rgba(255, 255, 255, 0.12) !important;
    box-shadow: 0 22px 70px rgba(0, 0, 0, 0.5) !important;
    backdrop-filter: blur(14px) !important;
  }

  .heinlin-login-panel h2 {
    margin: 0 0 22px !important;
    color: #ffffff !important;
    font-size: clamp(2rem, 5vw, 3.1rem) !important;
    line-height: 1 !important;
    font-weight: 950 !important;
    letter-spacing: -0.05em !important;
  }

  .heinlin-login-panel label {
    display: block !important;
    margin: 14px 0 8px !important;
    color: rgba(255, 255, 255, 0.86) !important;
    font-size: 1rem !important;
    font-weight: 900 !important;
  }

  .heinlin-login-panel input {
    width: 100% !important;
    min-height: 50px !important;
    border-radius: 18px !important;
    padding: 0 15px !important;
    border: 1px solid rgba(255, 255, 255, 0.15) !important;
    background: rgba(0, 0, 0, 0.32) !important;
    color: #ffffff !important;
    font-size: 1rem !important;
    outline: none !important;
  }

  .heinlin-login-panel .login-submit {
    width: 100% !important;
    min-height: 54px !important;
    margin-top: 22px !important;
    border-radius: 18px !important;
  }

  @media (max-width: 720px) {
    body.hfo-body {
      min-height: 100svh !important;
      background-attachment: scroll !important;
      background-position: center top !important;
    }

    .heinlin-login-page {
      width: calc(100vw - 24px) !important;
      min-height: 100svh !important;
      padding: 8px 0 16px !important;
      justify-content: flex-start !important;
      gap: 10px !important;
    }

    .heinlin-family-crest {
      max-width: min(270px, 66vw) !important;
      max-height: 255px !important;
    }

    .heinlin-login-panel {
      padding: 22px 22px 24px !important;
      border-radius: 26px !important;
    }

    .heinlin-login-panel h2 {
      margin-bottom: 18px !important;
      font-size: 2rem !important;
    }

    .heinlin-login-panel input {
      min-height: 46px !important;
    }

    .heinlin-login-panel .login-submit {
      min-height: 50px !important;
      margin-top: 18px !important;
    }
  }

  @media (max-width: 430px) and (max-height: 760px) {
    .heinlin-family-crest {
      max-width: min(230px, 58vw) !important;
      max-height: 220px !important;
    }

    .heinlin-login-panel {
      padding: 18px 20px 20px !important;
    }

    .heinlin-login-panel h2 {
      font-size: 1.75rem !important;
      margin-bottom: 14px !important;
    }

    .heinlin-login-panel input {
      min-height: 42px !important;
    }

    .heinlin-login-panel .login-submit {
      min-height: 48px !important;
      margin-top: 16px !important;
    }
  }
</style>

<div class="heinlin-login-page">

  <section class="heinlin-identity-card">
    <div class="crest-wrap">
      <img
        src="/static/heinlin-family-crest.png"
        alt="Heinlin Concrete Family Crest"
        class="heinlin-family-crest"
      >
    </div>
  </section>

  <form method="post" action="/login" class="panel heinlin-login-panel">
    <h2>Enter Command Center</h2>

    {% if error %}
      <p class="login-error">{{ error }}</p>
    {% endif %}

    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>

    <button type="submit" class="btn primary login-submit">
      Enter Command Center
    </button>
  </form>

</div>

{% endblock %}
