{% extends "base.html" %}{% block content %}<section class="section-head"><h1>Clients</h1><form method="post" action="/clients/new" class="inline"><input name="name" placeholder="New client name"><button class="primary">+ Client</button></form></section><form class="search"><input name="q" value="{{ q }}" placeholder="Search clients"><button>Search</button></form><section class="list-grid">{% for c in clients %}<a class="list-card" href="/clients/{{ c.id }}" {% if c.card_image %}style="background-image:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.78)),url('{{ c.card_image }}')"{% endif %}><h2>{{ c.name }}</h2><p>{{ c.phone or c.mobile or c.email }}</p><p>{{ c.city }} {{ c.state }}</p></a>{% endfor %}</section>{% endblock %}
