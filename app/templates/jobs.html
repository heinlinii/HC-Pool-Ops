{% extends "base.html" %}

{% block content %}
<main class="page">
    <h1>Jobs</h1>

    <form method="post" action="/jobs">
        <input name="title" placeholder="Job Title" required>

        <select name="property_id">
            {% for p in properties %}
                <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
        </select>

        <button type="submit">Add Job</button>
    </form>

    <h2>List</h2>
    <ul>
        {% for j in jobs %}
            <li>{{ j.title }}</li>
        {% endfor %}
    </ul>
</main>
{% endblock %}
