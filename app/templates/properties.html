{% extends "base.html" %}{% block content %}<section class="section-head"><h1>Properties</h1><form method="post" action="/properties/new" class="inline"><input name="client" placeholder="Client"><input name="address" placeholder="Address"><button class="primary">+ Property</button></form></section><form class="search"><input name="q" value="{{ q }}" placeholder="Search properties"><button>Search</button></form><section class="list-grid">{% for p in properties %}<a class="list-card" href="/properties/{{ p.id }}" {% if p.card_image %}style="background-image:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.78)),url('{{ p.card_image }}')"{% endif %}><h2>{{ p.property_name or p.client }}</h2><p>{{ p.address }}</p><p>{{ p.pool_type }} {{ p.pool_size }}</p></a>{% endfor %}</section>{% endblock %}
