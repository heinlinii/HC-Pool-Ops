<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties • PoolOps</title>
    <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>

<div class="page">

    <div class="topbar">
        <h1>Properties</h1>

        <div>
            <a class="btn" href="/dashboard">Dashboard</a>
            <a class="btn btn-success" href="/properties/new">Add Property</a>
        </div>
    </div>

    <div class="card">

        <input
            type="text"
            id="propertySearch"
            placeholder="Search properties..."
            class="search-input"
        >

        <table class="data-table" id="propertiesTable">
            <thead>
                <tr>
                    <th>Client</th>
                    <th>Address</th>
                    <th>Pool Type</th>
                    <th>Open</th>
                    <th>Delete</th>
                </tr>
            </thead>

            <tbody>
                {% for property in properties %}
                <tr>
                    <td>{{ property.client or "" }}</td>
                    <td>{{ property.address or "" }}</td>
                    <td>{{ property.pool_type or "" }}</td>

                    <td>
                        <a class="btn-small" href="/properties/{{ property.id }}">
                            Open
                        </a>
                    </td>

                    <td>
                        <form method="post"
                              action="/properties/delete/{{ property.id }}"
                              onsubmit="return confirm('Delete this property?');">
                            <button type="submit" class="danger-button">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

<script>
const searchInput = document.getElementById("propertySearch");

if (searchInput) {
    searchInput.addEventListener("keyup", function () {
        let filter = searchInput.value.toLowerCase();
        let rows = document.querySelectorAll("#propertiesTable tbody tr");

        rows.forEach(function(row) {
            let text = row.innerText.toLowerCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    });
}
</script>

</body>
</html>
