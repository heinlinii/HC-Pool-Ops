<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Dump • Heinlin Pool Ops</title>
    <link rel="stylesheet" href="/static/style.css?v=30">
</head>

<body>
{% include "_mobile_nav.html" %}

<div class="topbar-back">
    <button onclick="history.back()" class="back-btn">
        ← Back
    </button>
</div>

<div class="app-layout">

    {% include "_sidebar.html" %}

    <main class="main-content with-sidebar">

        <section class="hero-card">
            <h1>Field Brain Dump</h1>

            <p>
                Speak naturally. Dump everything you know about the client, pool, equipment, access, and service history.
            </p>
        </section>

        <section class="content-card">

            <form
                method="post"
                action="/brain-dump"
                class="job-form"
            >

                <div class="form-grid">

                    <div class="form-group">
                        <label>Client Name</label>

                        <input
                            type="text"
                            name="client"
                            placeholder="Ron Smith"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>Address</label>

                        <input
                            type="text"
                            name="address"
                            placeholder="123 Main St"
                        >
                    </div>

                    <div class="form-group form-full">
                        <label>Everything You Know</label>

{% include "_ai_prompt_panel.html" %}

                        <textarea
                            name="notes"
                            rows="16"
                            placeholder="Use phone microphone and just talk naturally..."
                        ></textarea>
                    </div>

                </div>

                <button
                    type="submit"
                    class="primary-button"
                >
                    Save Brain Dump
                </button>

            </form>

        </section>

    </main>

</div>

<div class="mobile-sidebar-toggle" onclick="document.body.classList.toggle('sidebar-open')">
    ☰
</div>

</body>
</html>
