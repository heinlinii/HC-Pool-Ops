<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | PoolOps Pro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <main class="login-wrap">
        <section class="login-card">
            <h1>PoolOps Pro</h1>
            <p>Heinlin Concrete Operations System</p>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login">
                <label>Username</label>
                <input type="text" name="username" placeholder="mike" required>

                <label>Password</label>
                <input type="password" name="password" placeholder="1234" required>

                <button type="submit">Login</button>
            </form>
            <div class="hint">
    <strong>Test logins</strong><br>
    mike / 5500 = admin<br>
    randy / 0318 = crew<br>
    traylor / 8899 = client
</div>
        </section>
    </main>
</body>
</html>
