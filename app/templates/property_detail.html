<!DOCTYPE html>
<html>
<head>
    <title>Property</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<main class="page-shell">

    <div class="card">
        <h1>{{ property.address }}</h1>
        <p>{{ property.client }}</p>
        <p>{{ property.pool_type }}</p>
    </div>

    <div class="card">
        <h2>Jobs</h2>

        {% for job in jobs %}
        <div class="card">
            <p>{{ job.job_type }}</p>
            <p>{{ job.status }}</p>
        </div>
        {% endfor %}
    </div>

<section class="card">
    <h2>Project Hub</h2>
    <p>Everything for this pool in one place.</p>

    <div class="project-toolbar">
        <a class="btn" href="/jobs">Jobs</a>
        <a class="btn" href="/photos">Photos</a>
        <a class="btn" href="/billing">Billing</a>
        <a class="btn" href="/schedule">Schedule</a>
        <a class="btn" href="/projects">All Projects</a>

        {% if property.address %}
        <a class="btn"
           target="_blank"
           href="https://www.google.com/maps/search/?api=1&query={{ property.address | urlencode }}">
            Map
        </a>
        {% endif %}
    </div>
</section>

</main>

</body>
</html>
