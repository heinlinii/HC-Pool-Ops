{% extends "base.html" %}

{% block title %}Add Property | HC Pool Ops{% endblock %}

{% block content %}
<div class="page-wrap narrow">
    <div class="page-head">
        <div>
            <h1>Add Property</h1>
            <p>Create a new property record.</p>
        </div>
        <div class="head-actions">
            <a class="btn" href="/properties">Back to Properties</a>
        </div>
    </div>

    <div class="panel">
        <form method="post" action="/properties/new" class="form-grid">
            <label>
                <span>Client</span>
                <select name="client_id" required>
                    {% for client in clients %}
                    <option value="{{ client.id }}">{{ client.name }}</option>
                    {% endfor %}
                </select>
            </label>

            <label>
                <span>Property Name</span>
                <input type="text" name="name" required />
            </label>

            <label>
                <span>Address</span>
                <input type="text" name="address" required />
            </label>

            <label>
                <span>Pool Type</span>
                <input type="text" name="pool_type" />
            </label>

            <label>
                <span>Status</span>
                <input type="text" name="status" value="Active" />
            </label>

            <label class="full">
                <span>Notes</span>
                <textarea name="notes" rows="5"></textarea>
            </label>

            <div class="full">
                <button type="submit" class="btn btn-primary">Save Property</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
