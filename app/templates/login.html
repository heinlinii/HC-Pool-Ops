{% extends "base.html" %}
{% block content %}

<div class="hfo-login-legacy">

  <div class="login-brand-row">
    <p class="kicker">HEINLIN FIELD OPS</p>

    <p class="heritage">
      Founded 1907 • 5 Generations Strong
    </p>
  </div>

  <h1>Heinlin Field Ops</h1>

  <p class="login-machine-line">
    Built by the Hands that Perfected the Term “Work Hard Play Harder.”
  </p>

</div>

  <form method="post" action="/login" class="panel hfo-login-card">

    <h2>Enter Command Center</h2>

    {% if error %}
      <p class="alert">{{ error }}</p>
    {% endif %}

    <label>
      Username
      <input name="username" autocomplete="username" required>
    </label>

    <label>
      Password
      <input name="password" type="password" autocomplete="current-password" required>
    </label>

    <button class="btn primary" type="submit">
      Enter Command Center
    </button>

  </form>

</section>

{% endblock %}
