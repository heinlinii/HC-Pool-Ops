<!doctype html><html><head><title>Client Portal</title><link rel="stylesheet" href="/static/core1/core1.css"></head><body><main class="shell"><a href="/core">← Core</a><h1>Client Portal</h1><p>Clients only see their own schedule/info when linked to a client account.</p><section class="card"><h2>Request Service</h2><form method="post" action="/portal/client/request-service"><label>Preferred date<input name="preferred_date" type="date"></label><label>Request notes<textarea name="notes"></textarea></label><button>Send request</button></form></section><section class="card"><h2>Future Schedule</h2><ul>{% for job in schedule %}<li>{{ job.date }} — {{ job.client }} — {{ job.job_type }} — {{ job.status }}</li>{% endfor %}</ul></section></main></body></html>
