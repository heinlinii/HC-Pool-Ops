{% extends "base.html" %}

{% block title %}Portal Request | HC Pool Ops{% endblock %}

{% block content %}
<div class="page-wrap narrow">
    <div class="page-head">
        <div>
            <h1>Customer Portal Request</h1>
            <p>Submit a service or support request.</p>
        </div>
    </div>

    <div class="panel">
        <form method="post" action="/portal/request" class="form-grid">
            <label>
                <span>Name</span>
                <input type="text" name="name" required />
            </label>

            <label>
                <span>Email</span>
                <input type="email" name="email" required />
            </label>

            <label>
                <span>Request Type</span>
                <input type="text" name="request_type" required />
            </label>

            <label class="full">
                <span>Message</span>
                <textarea name="message" rows="5"></textarea>
            </label>

            <div class="full">
                <button type="submit" class="btn btn-primary">Submit Request</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
