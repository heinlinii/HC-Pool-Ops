{% extends "base.html" %}{% block content %}<h1>Map / Property List</h1><section class="list-grid">{% for p in properties %}<a class="list-card" href="https://www.google.com/maps/search/?api=1&query={{ (p.address ~ ' ' ~ p.city ~ ' ' ~ p.state)|urlencode }}" target="_blank"><h2>{{ p.client }}</h2><p>{{ p.address }} {{ p.city }} {{ p.state }}</p></a>{% endfor %}</section>{% endblock %}
