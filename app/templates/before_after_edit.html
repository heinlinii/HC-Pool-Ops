{% extends "base.html" %}
{% block title %}Edit Before & After Photo{% endblock %}
{% block content %}
<div class="card form-card">
    <h1>Edit Before / After Photo</h1>
    <img src="{{ item.image_path }}" alt="Photo" style="max-width:100%; border-radius:12px; margin-bottom:16px;">

    <form method="post" class="form-grid">
        <label>Type
            <select name="photo_type">
                <option value="before" {% if item.photo_type == "before" %}selected{% endif %}>Before</option>
                <option value="after" {% if item.photo_type == "after" %}selected{% endif %}>After</option>
            </select>
        </label>
        <label class="full">Label<input name="label" value="{{ item.label }}"></label>
        <label class="full">Notes<textarea name="notes">{{ item.notes }}</textarea></label>
        <div class="full"><button class="btn btn-primary" type="submit">Save Changes</button></div>
    </form>
</div>
{% endblock %}
