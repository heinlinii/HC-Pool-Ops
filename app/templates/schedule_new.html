{% extends "base.html" %}

{% block title %}Add Schedule Item | HC Pool Ops{% endblock %}

{% block content %}
<div class="page-wrap narrow">
    <div class="page-head">
        <div>
            <h1>Add Schedule Item</h1>
            <p>Create a new scheduled visit or task.</p>
        </div>
        <div class="head-actions">
            <a class="btn" href="/schedule">Back to Schedule</a>
        </div>
    </div>

    <div class="panel">
        <form method="post" action="/schedule/new" class="form-grid">
            <label>
                <span>Property</span>
                <select name="property_id" required>
                    {% for property in properties %}
                    <option value="{{ property.id }}">{{ property.name }}</option>
                    {% endfor %}
                </select>
            </label>

            <label>
                <span>Title</span>
                <input type="text" name="title" required />
            </label>

            <label>
                <span>Date</span>
                <input type="date" name="scheduled_for" required />
            </label>

            <label>
                <span>Technician</span>
                <select name="technician" required>
                    {% for employee in employees %}
                    <option value="{{ employee.name }}">{{ employee.name }}</option>
                    {% endfor %}
                </select>
            </label>

            <label>
                <span>Status</span>
                <input type="text" name="status" value="Scheduled" />
            </label>

            <label class="full">
                <span>Notes</span>
                <textarea name="notes" rows="5"></textarea>
            </label>

            <div class="full">
                <button type="submit" class="btn btn-primary">Save Schedule Item</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
