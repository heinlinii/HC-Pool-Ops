{% extends "base.html" %}{% block content %}<section class="panel"><h1>Job Costing</h1><form method="post" action="/job-costing/add" class="form-grid"><select name="job_id"><option value="0">Choose job</option>{% for j in jobs %}<option value="{{ j.id }}">{{ j.client }} — {{ j.job_type }}</option>{% endfor %}</select><input name="client" placeholder="Client"><input name="labor" type="number" step="0.01" placeholder="Labor"><input name="materials" type="number" step="0.01" placeholder="Materials"><input name="subs" type="number" step="0.01" placeholder="Subs"><input name="equipment" type="number" step="0.01" placeholder="Equipment"><input name="fuel" type="number" step="0.01" placeholder="Fuel"><input name="other" type="number" step="0.01" placeholder="Other"><input name="invoice_amount" type="number" step="0.01" placeholder="Invoice Amount"><textarea class="wide" name="notes" placeholder="Notes"></textarea><button class="primary wide">Save Cost</button></form></section><section class="list-grid">{% for c in costs %}<div class="list-card"><h2>{{ c.client }}</h2><p>Labor {{ c.labor }} · Materials {{ c.materials }} · Fuel {{ c.fuel }}</p><p>Invoice {{ c.invoice_amount }}</p><p>{{ c.notes }}</p></div>{% endfor %}</section>{% endblock %}
