{% extends "base.html" %}{% block content %}<section class="panel"><h1>{{ client.name }}</h1><form method="post" action="/clients/{{ client.id }}/save" enctype="multipart/form-data" class="form-grid"><label>Name<input name="name" value="{{ client.name }}"></label><label>Contact<input name="contact_name" value="{{ client.contact_name }}"></label><label>Phone<input name="phone" value="{{ client.phone }}"></label><label>Mobile<input name="mobile" value="{{ client.mobile }}"></label><label>Email<input name="email" value="{{ client.email }}"></label><label>City<input name="city" value="{{ client.city }}"></label><label>State<input name="state" value="{{ client.state }}"></label><label>Zip<input name="zip_code" value="{{ client.zip_code }}"></label><label>Portal Username<input name="portal_username" value="{{ client.portal_username }}"></label><label>Portal Password<input name="portal_password" value="{{ client.portal_password }}"></label><label class="wide">Billing Address<textarea name="billing_address">{{ client.billing_address }}</textarea></label><label class="wide">Notes<textarea name="notes">{{ client.notes }}</textarea></label><label>Client Card Photo<input type="file" name="card_image" accept="image/*"></label><button class="primary wide">Save Client</button></form><form method="post" action="/clients/{{ client.id }}/delete" onsubmit="return confirm('Delete this client AND related properties, jobs, photos, and costs? This cannot be undone.')"><button class="danger wide" type="submit">Delete Client</button></form></section><h2>Properties</h2><section class="list-grid">{% for p in properties %}<a class="list-card" href="/properties/{{ p.id }}"><h3>{{ p.property_name or p.address }}</h3><p>{{ p.address }}</p></a>{% endfor %}</section><h2>Jobs</h2><section class="list-grid">{% for j in jobs %}<a class="list-card" href="/jobs/{{ j.id }}"><h3>{{ j.job_type }}</h3><p>{{ j.status }} · {{ j.date }}</p></a>{% endfor %}</section>{% endblock %}
