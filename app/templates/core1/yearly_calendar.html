<!doctype html><html><head><title>Year Calendar</title><link rel="stylesheet" href="/static/core1/core1.css"></head><body><main class="shell"><a href="/core">← Core</a><h1>{{ year }} Year Calendar</h1><div class="months">{% for m in months %}<section class="card"><h2>{{ m.name }}</h2><ul>{% for job in jobs %}{% if job.date and job.date.month == m.month %}<li><b>{{ job.date }}</b> — {{ job.client }} — {{ job.job_type }} — {{ job.status }}</li>{% endif %}{% endfor %}</ul></section>{% endfor %}</div></main></body></html>
