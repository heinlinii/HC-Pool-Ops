{% extends "base.html" %}
{% block content %}

<style>
  .hfo-section-wrap {
    width: min(1180px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 28px 0 60px;
  }

  .hfo-section-top {
    margin-bottom: 22px;
  }

  .hfo-back-link {
    display: inline-flex;
    align-items: center;
    padding: 10px 14px;
    border-radius: 999px;
    color: #fff;
    text-decoration: none;
    font-weight: 900;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.14);
    margin-bottom: 18px;
  }

  .hfo-section-top h1 {
    margin: 0;
    font-size: clamp(48px, 8vw, 92px);
    line-height: .95;
    letter-spacing: -0.06em;
  }

  .hfo-section-top p {
    max-width: 820px;
    color: rgba(255,255,255,.78);
    font-size: 18px;
    line-height: 1.5;
    margin: 14px 0 0;
  }

  .hfo-section-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .hfo-tool-card {
    min-height: 175px;
    padding: 22px;
    border-radius: 26px;
    background:
      radial-gradient(circle at top left, rgba(255,255,255,.13), transparent 36%),
      linear-gradient(135deg, rgba(32,38,42,.92), rgba(7,11,14,.96));
    border: 1px solid rgba(255,255,255,.12);
    box-shadow: 0 16px 48px rgba(0,0,0,.32);
  }

  .hfo-tool-card h2 {
    margin: 0;
    font-size: clamp(30px, 4vw, 48px);
    letter-spacing: -0.045em;
    line-height: 1;
  }

  .hfo-tool-card p {
    color: rgba(255,255,255,.76);
    font-size: 16px;
    line-height: 1.45;
    margin: 12px 0 18px;
  }

  .hfo-tool-card a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 10px 16px;
    border-radius: 999px;
    color: #fff;
    text-decoration: none;
    font-weight: 900;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    border: 1px solid rgba(255,255,255,.16);
  }

  @media (max-width: 820px) {
    .hfo-section-grid {
      grid-template-columns: 1fr;
    }

    .hfo-tool-card {
      min-height: 150px;
    }
  }
</style>

<div class="hfo-section-wrap">

  <section class="hfo-section-top">
    <a class="hfo-back-link" href="/jarvis">← Dashboard</a>

    <h1>{{ section.title }}</h1>

    <p>
      {{ section.description or section.subtitle }}
    </p>
  </section>

  <section class="hfo-section-grid">
    {% for item in section["items"] %}
      <div class="hfo-tool-card">
        <h2>{{ item.title }}</h2>
        <p>{{ item.subtitle }}</p>
        <a href="{{ item.url }}">{{ item.button or "Open" }} →</a>
      </div>
    {% endfor %}
  </section>

</div>

{% endblock %}
