<script>
  const searchInput = document.querySelector('input[type="search"]');

  const searchItems = [
    { type: "Jobs", title: "Jobs active work work orders crews", href: "/jobs" },
    { type: "Schedule", title: "Schedule calendar crew planning open slots", href: "/schedule" },
    { type: "Field Logs", title: "Field logs photos notes daily progress", href: "/field-logs" },
    { type: "Weather", title: "Weather rain wind forecast job conditions", href: "/weather" },
    { type: "Clients", title: "Clients customers homeowners contacts", href: "/clients" },
    { type: "Properties", title: "Properties addresses pools job locations", href: "/properties" },
    { type: "Backups", title: "Backups database export safety", href: "/backups" },
    { type: "Billing", title: "Billing invoices QuickBooks CSV money", href: "/billing" }
  ];

  const resultsBox = document.createElement("div");
  resultsBox.className = "search-results";
  searchInput.parentElement.appendChild(resultsBox);

  function runSearch() {
    const query = searchInput.value.trim().toLowerCase();
    resultsBox.innerHTML = "";

    if (!query) {
      resultsBox.style.display = "none";
      return;
    }

    const matches = searchItems.filter(item =>
      item.type.toLowerCase().includes(query) ||
      item.title.toLowerCase().includes(query)
    );

    resultsBox.style.display = "grid";

    if (!matches.length) {
      resultsBox.innerHTML = `
        <div class="search-result">
          <small>No Match</small>
          <div>No result found.</div>
        </div>
      `;
      return;
    }

    matches.forEach(item => {
      resultsBox.innerHTML += `
        <a class="search-result" href="${item.href}">
          <small>${item.type}</small>
          <div>${item.title}</div>
        </a>
      `;
    });
  }

  searchInput.addEventListener("input", runSearch);

  document.addEventListener("keydown", function(event) {
    if (event.key === "/" && document.activeElement !== searchInput) {
      event.preventDefault();
      searchInput.focus();
    }

    if (event.key === "Escape") {
      searchInput.value = "";
      runSearch();
      searchInput.blur();
    }

    if (event.key === "Enter" && document.activeElement === searchInput) {
      const firstResult = resultsBox.querySelector("a.search-result");
      if (firstResult) {
        window.location.href = firstResult.href;
      }
    }
  });

  const floatingSearch = document.querySelector(".floating-search");

  if (floatingSearch) {
    floatingSearch.addEventListener("click", function() {
      searchInput.focus();
      searchInput.scrollIntoView({ behavior: "smooth", block: "center" });
    });
  }
</script>
