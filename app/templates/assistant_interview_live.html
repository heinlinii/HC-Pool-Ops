{% extends "base.html" %}
{% block content %}

<style>
  .assistant-page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 160px 18px 40px;
    color: #fff;
  }

  .assistant-card {
    border-radius: 28px;
    padding: 34px;
    background: rgba(7, 14, 20, .94);
    border: 1px solid rgba(214,179,106,.28);
  }

  .assistant-card h1 {
    margin: 0 0 14px;
    color: #fff;
    font-size: clamp(3rem, 7vw, 7rem);
    line-height: .9;
  }

  .assistant-card p {
    color: rgba(255,255,255,.78);
    font-weight: 850;
    font-size: 1.15rem;
  }

  .assistant-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 24px;
  }

  .assistant-actions a {
    text-decoration: none;
    border-radius: 999px;
    padding: 14px 20px;
    font-weight: 1000;
    background: linear-gradient(135deg, #7b5a22, #d6b36a, #5f4519);
    color: #071017;
  }

  .assistant-box {
    margin-top: 22px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(0,0,0,.28);
    border: 1px solid rgba(214,179,106,.18);
    color: rgba(255,255,255,.82);
    font-weight: 800;
  }
</style>

<div class="assistant-page">
  <section class="assistant-card">
    <h1>Talk to Jarvis</h1>
    <p>Live assistant page placeholder.</p>

    <div class="assistant-actions">
      <a href="/jarvis">Dashboard</a>
      <a href="/organize-my-day">Handle Today</a>
      <a href="/admin/link-check">Link Check</a>
    </div>

    <div class="assistant-box">
      Next step will be wiring this page to your real assistant/interview workflow.
    </div>
  </section>
</div>

{% endblock %}
