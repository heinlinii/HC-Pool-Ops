<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h1>PoolOps Login</h1>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post" action="/login">
    <input name="username" placeholder="Username" required>
    <br><br>
    <input type="password" name="password" placeholder="Password" required>
    <br><br>
    <button type="submit">Login</button>
</form>

</body>
</html>
