<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Service • PoolOps2</title>
    <link rel="stylesheet" href="/static/style.css?v=12">
</head>

<body>
{% include "_mobile_nav.html" %}

<div class="app-layout">

    <aside class="sidebar">

        <div class="sidebar-top">
            <img src="/static/logo.png" alt="Heinlin Concrete Logo" class="sidebar-logo">
            <h1>CLIENT PORTAL</h1>
            <p>Heinlin Concrete LLC</p>
        </div>

        <nav class="sidebar-nav">
            <a href="/client-dashboard">Dashboard</a>
            <a href="/client-request" class="active">Request Service</a>
            <a href="/client-logout">Logout</a>
        </nav>

        <div class="sidebar-bottom">
            <p>{{ client.name }}</p>
            <span>Client Account</span>
        </div>

    </aside>

    <main class="main-content">

        <div class="topbar">
            <div>
                <h2>Request Service</h2>
                <p>Send Heinlin Concrete a new service, remodel, or scheduling request.</p>
            </div>
        </div>

        {% if message %}
        <section class="content-card">
            <div class="success-message">
                {{ message }}
            </div>
        </section>
        {% endif %}

        <section class="content-card">

            <div class="card-header">
                <h3>New Request</h3>
            </div>

            <form method="post" action="/client-request" class="job-form">

                <div class="form-grid">

                    <div class="form-group">
                        <label>Request Type</label>
                        <select name="request_type" required>
                            <option>Service Request</option>
                            <option>Pool Remodel</option>
                            <option>Concrete Work</option>
                            <option>Auto Cover Service</option>
                            <option>Tile / Coping</option>
                            <option>EcoFinish</option>
                            <option>Schedule Change</option>
                            <option>Estimate Request</option>
                            <option value="Pool Opening">Pool Opening</option>
                            <option value="Pool Closing">Pool Closing</option>
                            <option value="Weekly Pool Service">Weekly Pool Service</option>
                            <option value="Pool Cleaning">Pool Cleaning</option>
                            <option value="Chemical Check">Chemical Check</option>
                            <option value="Equipment Check">Equipment Check</option>
                            <option value="Cover Pump Check">Cover Pump Check</option>
                        
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Property / Address</label>
                        <select name="address">
                            <option value="">Select property or type details in message</option>

                            {% for property in properties %}
                            <option value="{{ property.address }}">
                                {{ property.address }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Requested Date</label>
                        <input
                            type="text"
                            name="requested_date"
                            placeholder="Example: Next week / Friday / ASAP"
                        >
                    </div>

                    <div class="form-group form-full">
                        <label>Message</label>
                        <textarea
                            name="message"
                            rows="6"
                            placeholder="Tell us what you need..."
                        ></textarea>
                    </div>

                </div>

                <button type="submit" class="primary-button">
                    Submit Request
                </button>

            </form>

        </section>

    </main>

</div>

</body>
</html>
