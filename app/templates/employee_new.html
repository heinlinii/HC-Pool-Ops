{% extends "base.html" %}

{% block title %}Add Employee | HC Pool Ops{% endblock %}

{% block content %}
<div class="page-wrap narrow">
    <div class="page-head">
        <div>
            <h1>Add Employee</h1>
            <p>Create a new employee record.</p>
        </div>
        <div class="head-actions">
            <a class="btn" href="/employees">Back to Employees</a>
        </div>
    </div>

    <div class="panel">
        <form method="post" action="/employees/new" class="form-grid">
            <label>
                <span>Name</span>
                <input type="text" name="name" required />
            </label>

            <label>
                <span>Role</span>
                <input type="text" name="role" required />
            </label>

            <label>
                <span>Phone</span>
                <input type="text" name="phone" />
            </label>

            <label>
                <span>Email</span>
                <input type="email" name="email" />
            </label>

            <label>
                <span>Status</span>
                <input type="text" name="status" value="Active" />
            </label>

            <div class="full">
                <button type="submit" class="btn btn-primary">Save Employee</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
