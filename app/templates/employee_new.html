{% extends "base.html" %}
{% block title %}Add Employee{% endblock %}
{% block content %}
<div class="card form-card">
    <h1>Add Employee</h1>
    <form method="post" class="form-grid">
        <label>Name<input name="name" required></label>
        <label>Role<input name="role" placeholder="Lead Tech / Installer / Cleaner"></label>
        <label>Phone<input name="phone"></label>
        <label>Email<input name="email" type="email"></label>
        <label>Status
            <select name="status">
                <option value="active">Active</option>
                <option value="seasonal">Seasonal</option>
                <option value="inactive">Inactive</option>
            </select>
        </label>
        <label class="full">Notes<textarea name="notes"></textarea></label>
        <div class="full"><button class="btn btn-primary" type="submit">Save Employee</button></div>
    </form>
</div>
{% endblock %}
