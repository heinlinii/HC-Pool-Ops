services:
  - type: web
    name: hc-pool-ops
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.app.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hc-pool-ops-db
          property: connectionString
      - key: SESSION_SECRET
        value: change-this-on-render

databases:
  - name: hc-pool-ops-db
    plan: free