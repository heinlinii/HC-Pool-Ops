<!DOCTYPE html>
<html>
<head>
    <title>Add Property</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<main class="page-shell">

    <div class="card">
        <h1>Add Property</h1>
    </div>

    <div class="card">
        <form method="post" action="/properties/new" class="property-form">
<label>Client</label>

<select name="client_id" required>

    <option value="">
        Select Client
    </option>

    {% for client in clients %}
        <option value="{{ client.id }}">
            {{ client.name }}
        </option>
    {% endfor %}

</select>

<br><br>

<label>Property Address</label>

<input
    name="address"
    id="property-address"
    placeholder="Paste address or Google Maps pin link"
    required
>

<br><br>

<a
    class="btn"
    href="https://www.google.com/maps"
    target="_blank"
>
    Open Google Maps
</a>

<p class="helper-text">
    Open Google Maps, search/drop the pin, copy the address or share link, then paste it here.
</p>

            <label>Pool Type</label>
            <input name="pool_type">

            <label>Notes</label>
            <textarea name="notes"></textarea>

            <button type="submit">Save Property</button>

        </form>
    </div>

</main>

</body>
</html>
