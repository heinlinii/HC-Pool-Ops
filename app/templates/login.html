<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Heinlin Field Ops Login</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      background:
        linear-gradient(rgba(0,0,0,.70), rgba(0,0,0,.88)),
        url("/static/uploads/Dedicated%20to%20Steve%20Meyerholtz.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
    }

.heinlin-login-wrap {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1.15fr .85fr;
  gap: 24px;
  align-items: start;
  padding: 10px 24px 24px;
  box-sizing: border-box;
  max-width: 1380px;
  margin: 0 auto;
}

    .heinlin-login-hero,
    .heinlin-login-card {
      background:
        radial-gradient(circle at top right, rgba(214,179,106,.16), transparent 34%),
        rgba(7, 14, 20, .92);
      border: 1px solid rgba(214,179,106,.34);
      border-radius: 30px;
      box-shadow: 0 26px 80px rgba(0,0,0,.58);
      overflow: hidden;
    }

    .heinlin-login-hero {
  padding: 26px 34px 28px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  min-height: 500px;
}

.heinlin-hero-topline {
  display: block;
  margin-top: 22px;
}

   .heinlin-hero-topline strong {
  display: block;
  color: #fff;
  font-size: clamp(1.05rem, 1.45vw, 1.65rem);
  line-height: 1.08;
  font-weight: 1000;
  letter-spacing: .08em;
  text-transform: uppercase;
}

   .heinlin-crest-stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 385px;
  width: 100%;
}

.heinlin-crest-stage img {
  width: 100%;
  height: auto;
  max-width: 100%;
  max-height: 500px;
  object-fit: contain;
  border-radius: 30px;
  border: 1px solid rgba(214,179,106,.45);
  box-shadow: 0 22px 70px rgba(0,0,0,.62);
  background: #000;
}

    .heinlin-login-card {
  padding: 34px 34px 30px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  min-height: 500px;
}

    .login-brand-kicker {
  color: #d6b36a;
  font-size: clamp(1rem, 1.35vw, 1.55rem);
  font-weight: 1000;
  letter-spacing: .22em;
  text-transform: uppercase;
  margin-bottom: 18px;
}

    .login-card-head.compact {
      margin-bottom: 18px;
    }

    .login-card-head.compact h2 {
      margin: 0;
      color: #fff;
      font-size: clamp(2.2rem, 4vw, 3.8rem);
      line-height: .9;
      letter-spacing: -.045em;
      text-transform: uppercase;
    }

    .login-card-head.compact p {
      margin: 8px 0 0;
      color: rgba(255,255,255,.78);
      font-size: 1.05rem;
      font-weight: 800;
    }

    .heinlin-login-form {
      display: grid;
      gap: 14px;
    }

    .heinlin-login-form label {
      color: #d8d0bd;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
      font-size: .78rem;
    }

    .heinlin-login-form input {
      width: 100%;
      box-sizing: border-box;
      min-height: 60px;
      padding: 0 18px;
      border-radius: 18px;
      border: 1px solid rgba(214,179,106,.32);
      background: rgba(0,0,0,.42);
      color: #fff;
      font-size: 1.08rem;
      outline: none;
      font-family: Arial, sans-serif;
    }

    .heinlin-login-form input:focus {
      border-color: rgba(214,179,106,.72);
      box-shadow: 0 0 0 4px rgba(214,179,106,.10);
    }

    .heinlin-login-btn {
      min-height: 66px;
      margin-top: 4px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #8a6726, #d6b36a, #6f511d);
      color: #071017;
      font-size: 1.15rem;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .06em;
      cursor: pointer;
      box-shadow: 0 14px 36px rgba(0,0,0,.45);
      font-family: Arial, sans-serif;
    }

    .heinlin-login-btn:hover {
      transform: translateY(-1px);
    }

    .login-error {
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(150, 20, 20, .28);
      border: 1px solid rgba(255, 120, 100, .42);
      color: #ffd6cc;
      font-weight: 900;
    }

    .login-footer-note {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(214,179,106,.18);
      color: rgba(255,255,255,.72);
      font-weight: 800;
      line-height: 1.35;
    }

    .login-footer-note strong {
      color: #d6b36a;
    }

    @media (max-width: 900px) {
      .heinlin-login-wrap {
        grid-template-columns: 1fr;
        padding: 18px 14px 28px;
      }

      .heinlin-login-hero {
        min-height: auto;
        padding: 24px;
      }

      .heinlin-hero-topline {
        display: block;
        margin-bottom: 18px;
      }

      .heinlin-hero-topline span,
      .heinlin-hero-topline strong {
        display: block;
        font-size: 1rem;
        line-height: 1.2;
        letter-spacing: .09em;
      }

      .heinlin-hero-topline span {
        margin-bottom: 8px;
      }

      .heinlin-crest-stage {
        min-height: 280px;
      }

      .heinlin-crest-stage img {
        width: 100%;
        max-height: 360px;
      }

      .heinlin-login-card {
        padding: 22px;
        padding-top: 28px;
        min-height: auto;
      }
    }
  </style>
</head>

<body>

  <div class="heinlin-login-wrap">

    <section class="heinlin-login-hero">
  <div class="heinlin-crest-stage">
    <img src="/static/heinlin-wide-crest.png" alt="Heinlin Crest">
  </div>

  <div class="heinlin-hero-topline">
    <strong>Built by the hands that perfected the term “work hard play harder.”</strong>
  </div>
</section>

   <section class="heinlin-login-card">

  <div class="login-brand-kicker">Heinlin Field Ops</div>

  <div class="login-card-head compact">
    <h2>Login</h2>
  </div>>

      {% if error %}
        <div class="login-error">{{ error }}</div>
      {% endif %}

      <form class="heinlin-login-form" method="post" action="/login">
        <div>
          <label>Username</label>
          <input name="username" type="text" autocomplete="username" placeholder="Enter username">
        </div>

        <div>
          <label>Password</label>
          <input name="password" type="password" autocomplete="current-password" placeholder="Enter password">
        </div>

        <button class="heinlin-login-btn" type="submit">Enter Field Ops</button>
      </form>

      <div class="login-footer-note">
        <strong>Heinlin rule:</strong> If it happened in the field, it belongs in Field Ops.
        No lost notes. No mystery photos. No “I think we talked about that.”
      </div>

    </section>

  </div>

 <script>
  if ("scrollRestoration" in history) {
    history.scrollRestoration = "manual";
  }

  window.addEventListener("load", function () {
    window.scrollTo(0, 0);
  });
</script>

</body>
</html>
