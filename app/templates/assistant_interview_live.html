{% extends "base.html" %}
{% block content %}

<section class="section-head">
  <h1>Talk to Jarvis</h1>
  <p>Tell Jarvis what needs handled. Jarvis will file it into Invisible Office.</p>
</section>

<section class="card">
  <h2>Send It to Jarvis</h2>

  <form method="post" action="/assistant-live/send" class="stack">
    <textarea
      name="message"
      placeholder="Tell Jarvis what needs handled..."
      style="min-height:160px;width:100%;"
      autofocus
    ></textarea>

    <div class="inline-form">
      <input name="client" placeholder="Client, if known">
      <input name="property" placeholder="Property / job, if known">
      <input name="due_date" type="date">
      <select name="priority">
        <option value="">Priority</option>
        <option value="Normal">Normal</option>
        <option value="High">High</option>
        <option value="Urgent">Urgent</option>
      </select>
    </div>

    <button class="btn primary" type="submit">Send It</button>
  </form>
</section>

<section class="grid">
  <a class="card" href="/invisible-office">
    <h2>Invisible Office</h2>
    <p>View the notes, tasks, follow-ups, and reminders Jarvis has filed.</p>
  </a>

  <a class="card" href="/jarvis">
    <h2>Dashboard</h2>
    <p>Return to Heinlin Field Ops.</p>
  </a>
</section>

{% endblock %}
