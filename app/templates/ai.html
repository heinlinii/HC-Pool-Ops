{% extends "base.html" %}

{% block content %}
<div class="page-header">
  <h1>AI Assistant</h1>
  <p>PoolOps2 field intelligence for repairs, estimates, service notes, and troubleshooting.</p>
</div>

<div class="card">
  <form method="post" action="/ai">
    <label for="question">Ask PoolOps2 AI</label>
    <textarea
      id="question"
      name="question"
      rows="7"
      placeholder="Example: Hayward H400FDN throws IF code. Igniter and flame sensor were replaced. What should I check next?"
      required>{{ question or "" }}</textarea>

    <button type="submit" class="btn-primary">Ask AI</button>
  </form>
</div>

{% if answer %}
<div class="card ai-answer">
  <h2>PoolOps2 AI Response</h2>
  <pre>{{ answer }}</pre>
</div>
{% endif %}

<div class="card">
  <h2>Quick Prompts</h2>

  <form method="post" action="/ai">
    <input type="hidden" name="question" value="Clean this up into a professional pool service note: cleaned baskets, brushed pool, added acid, customer says heater is loud.">
    <button type="submit">Service Note Cleanup</button>
  </form>

  <form method="post" action="/ai">
    <input type="hidden" name="question" value="Help diagnose a pool heater that clicks once but does not spark. Give field steps in order.">
    <button type="submit">Heater Diagnosis</button>
  </form>

  <form method="post" action="/ai">
    <input type="hidden" name="question" value="Build a good/better/best pool automation estimate structure for a service client.">
    <button type="submit">Estimate Helper</button>
  </form>
</div>
{% endblock %}
