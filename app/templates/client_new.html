{% extends "base.html" %}
{% block title %}Add Client{% endblock %}
{% block content %}
<div class="card form-card">
    <h1>Add Client</h1>
    <form method="post" class="form-grid">
        <label>Name<input name="name" required></label>
        <label>Phone<input name="phone"></label>
        <label>Email<input name="email" type="email"></label>
        <label>Billing Address<input name="billing_address"></label>
        <label class="full">Notes<textarea name="notes"></textarea></label>
        <div class="full"><button class="btn btn-primary" type="submit">Save Client</button></div>
    </form>
</div>
{% endblock %}
