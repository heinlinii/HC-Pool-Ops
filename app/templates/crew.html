{% extends "base.html" %}{% block content %}<h1>Crew</h1><section class="list-grid">{% for e in employees %}<form class="list-card" method="post" action="/crew/{{ e.id }}/save"><h2>{{ e.name }}</h2><input name="name" value="{{ e.name }}"><input name="role" value="{{ e.role }}"><input name="phone" value="{{ e.phone }}" placeholder="Phone"><input name="email" value="{{ e.email }}" placeholder="Email"><input name="username" value="{{ e.username }}" placeholder="Login username"><input name="password" value="{{ e.password }}" placeholder="Login password"><input type="hidden" name="active" value="1"><button class="primary">Save Employee</button></form>{% endfor %}</section>{% endblock %}
