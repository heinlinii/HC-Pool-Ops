{% extends "base.html" %}
{% block title %}Edit Employee{% endblock %}
{% block content %}
<div class="card form-card">
    <h1>Edit Employee</h1>
    <form method="post" class="form-grid">
        <label>Name<input name="name" value="{{ employee.name }}" required></label>
        <label>Role<input name="role" value="{{ employee.role }}"></label>
        <label>Phone<input name="phone" value="{{ employee.phone }}"></label>
        <label>Email<input name="email" type="email" value="{{ employee.email }}"></label>
        <label>Status
            <select name="status">
                <option value="active" {% if employee.status == "active" %}selected{% endif %}>Active</option>
                <option value="inactive" {% if employee.status == "inactive" %}selected{% endif %}>Inactive</option>
            </select>
        </label>
        <label class="full">Notes<textarea name="notes">{{ employee.notes }}</textarea></label>
        <div class="full"><button class="btn btn-primary" type="submit">Save Employee</button></div>
    </form>
</div>
{% endblock %}
